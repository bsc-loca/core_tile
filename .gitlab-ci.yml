isa-tests:
  extends: .questa_riscv
  stage: simulation
  rules:
    - !reference [.rules_default]
  dependencies:
    - build-simulator
    - build-isa-tests
  script:
    - ./tb/tb_isa_tests/run-tests.py ./sim tb/tb_isa_tests/build/isa

isa-tests-questa:
  extends: .questa_riscv
  stage: simulation
  rules:
    - !reference [.rules_default]
  dependencies:
    - build-simulator
    - build-isa-tests
  script:
    - ./tb/tb_isa_tests/run-tests.sh ./simulator/questa/sim.sh tb/tb_isa_tests/build/isa

benchmarks:
  extends: .questa_riscv
  stage: simulation
  rules:
    - !reference [.rules_default]
  dependencies:
    - build-simulator
    - build-benchmarks
  timeout: 4h
  variables:
    RUNNER_SCRIPT_TIMEOUT: 3h50m
  script:
    - ./run-benchmarks.sh

vcs:
  extends: .vcs_riscv
  stage: simulation
  rules:
    - !reference [.rules_default]
  timeout: 1 hrs
  dependencies:
    - build-vcs
    - build-isa-tests
    - build-simulator
  script:
    - cp bootrom.hex build_vcs/bootrom.hex
    - ./build_vcs/simv +vcs+lic+wait +load=./tb/tb_isa_tests/build/isa/rv64ui-p-add

